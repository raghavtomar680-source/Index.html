<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDHedits - Premium Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#070913] text-gray-100 font-sans min-h-screen p-4 flex flex-col items-center justify-center">

  <div class="max-w-md w-full bg-slate-900/80 border border-slate-800 rounded-3xl p-6 shadow-2xl relative">
    
    <div class="text-center mb-6">
      <h1 class="text-3xl font-black bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">PDHedits</h1>
      <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1">Premium Study Dashboard</p>
    </div>

    <div id="home-view" class="space-y-4">
      <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800">
        <span class="text-[10px] font-bold text-cyan-400 bg-cyan-400/10 px-2.5 py-0.5 rounded-full uppercase">System Active</span>
        <h2 class="text-lg font-bold text-slate-200 mt-2">Welcome Back, Raghav</h2>
        <p class="text-xs text-slate-400 mt-0.5">Select a class below to see the integrated syllabus sheets.</p>
      </div>

      <button onclick="openSyllabus('Class 9')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 border border-slate-700/50 p-4 rounded-xl font-bold flex justify-between items-center transition-all">
        <span>📚 Class 9 Syllabus</span>
        <span class="text-cyan-400">→</span>
      </button>

      <button onclick="openSyllabus('Class 10')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 border border-slate-700/50 p-4 rounded-xl font-bold flex justify-between items-center transition-all">
        <span>🎓 Class 10 Syllabus</span>
        <span class="text-cyan-400">→</span>
      </button>

      <button onclick="openQuiz()" class="w-full text-left bg-gradient-to-r from-cyan-950/40 to-indigo-950/40 border border-cyan-500/30 p-4 rounded-xl font-bold flex justify-between items-center text-cyan-400 transition-all">
        <span>⚡ Launch Practice Quiz</span>
        <span>🔥</span>
      </button>
    </div>

    <div id="detail-view" class="hidden space-y-4">
      <button onclick="backToHome()" class="text-xs font-bold text-slate-400 hover:text-white bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-lg transition-all">
        ← Back
      </button>
      <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4">
        <h3 id="detail-title" class="text-xl font-black text-white mb-3"></h3>
        <div id="detail-content" class="space-y-2 text-sm text-slate-300"></div>
      </div>
    </div>

  </div>

  <script>
    const syllabusData = {
      "Class 9": ["• Science (Physics, Chemistry, Biology)", "• Mathematics (Full Modules)", "• Social Science (History, Civics, Geo)", "• English Language & Lit."],
      "Class 10": ["• Science (Board Core)", "• Mathematics (Standard & Basic)", "• Social Science (Full Map)", "• English Core Modules"]
    };

    function openSyllabus(className) {
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('detail-view').classList.remove('hidden');
      document.getElementById('detail-title').innerText = className + " Syllabus";
      
      let listHtml = syllabusData[className].map(item => `<div class="p-2.5 bg-slate-900 border border-slate-800/60 rounded-xl">${item}</div>`).join('');
      document.getElementById('detail-content').innerHTML = listHtml;
    }

    function openQuiz() {
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('detail-view').classList.remove('hidden');
      document.getElementById('detail-title').innerText = "Interactive Quiz Mode";
      document.getElementById('detail-content').innerHTML = `
        <div class="text-center py-4 space-y-3">
          <p class="text-xs text-slate-400">Sample evaluation question compiled successfully:</p>
          <p class="font-semibold text-white">Which file format is used to render layouts direct in browsers?</p>
          <button onclick="alert('Correct! HTML is instantly rendered.')" class="w-full bg-slate-900 hover:bg-cyan-950/40 border border-slate-800 text-xs text-left p-2.5 rounded-lg">A. HTML File</button>
          <button onclick="alert('Incorrect! React needs a builder.')" class="w-full bg-slate-900 border border-slate-800 text-xs text-left p-2.5 rounded-lg">B. Raw React Component</button>
        </div>
      `;
    }

    function backToHome() {
      document.getElementById('home-view').classList.remove('hidden');
      document.getElementById('detail-view').classList.add('hidden');
    }
  </script>
</body>
</html>
